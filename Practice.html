<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Grammar Terminal</title>
    <style>
        :root { --accent: #00ff41; --bg: #0d0d0d; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; }
        .container { width: 100%; max-width: 500px; }
        header { border-bottom: 2px solid #333; width: 100%; padding-bottom: 10px; margin-bottom: 20px; text-align: left; }
        .prompt { color: var(--accent); margin-right: 10px; }
        .card { background: #1a1a1a; border: 1px solid #333; padding: 20px; border-radius: 5px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .sentence { margin-bottom: 15px; font-size: 1.1rem; line-height: 1.6; }
        input { background: transparent; border: none; border-bottom: 2px solid var(--accent); color: white; font-family: inherit; font-size: 1.1rem; width: 100%; outline: none; padding: 5px 0; margin-top: 10px; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 8px 15px; cursor: pointer; transition: 0.3s; font-family: inherit; }
        button:hover { background: var(--accent); color: black; }
        .feedback { margin-top: 15px; min-height: 20px; font-weight: bold; }
        .correct { color: var(--accent); }
        .error { color: #ff4141; }
        .stats { font-size: 0.8rem; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div><span class="prompt">admin@grammar:~$</span> run test_prep.sh</div>
            <div class="stats" id="progress">Progress: 1/10</div>
        </header>

        <div class="card">
            <div class="sentence" id="sentence-display"></div>
            <span class="prompt">></span><input type="text" id="user-input" placeholder="Type answer(s) here..." autocomplete="off">
            <div class="feedback" id="feedback"></div>
            <div class="btn-group">
                <button onclick="checkAnswer()">SUBMIT</button>
                <button onclick="nextQuestion()" id="next-btn" style="display:none">NEXT ></button>
            </div>
        </div>
        
        <p style="font-size: 0.7rem; color: #444;">Note: Use a slash ( / ) for two-blank answers.</p>
    </div>

    <script>
        const questions = [
            { q: "1. I ____ (read) a book when suddenly the lights ____ (go) out.", a: "was reading / went" },
            { q: "2. While the students ____ (write) their essays, the fire alarm ____ (start) to ring.", a: "were writing / started" },
            { q: "3. My mother ____ (cook) dinner while my father ____ (wash) the car in the garden.", a: "was cooking / was washing" },
            { q: "4. When I ____ (arrive) at the party, everyone ____ (dance) and singing.", a: "arrived / was dancing" },
            { q: "5. He ____ (break) his leg while he ____ (ski) in the Alps last winter.", a: "broke / was skiing" },
            { q: "6. The phone ____ (ring) three times while I ____ (take) a shower.", a: "rang / was taking" },
            { q: "7. What ____ (you / do) when the accident ____ (happen)?", a: "were you doing / happened" },
            { q: "8. I ____ (not / see) the thief because I ____ (sleep) on the sofa.", a: "didn't see / was sleeping" },
            { q: "9. It ____ (begin) to rain just as we ____ (leave) the house.", a: "began / were leaving" },
            { q: "10. Yesterday at 7:00 PM, I ____ (eat) dinner with my family, while my phone ____ (ring).", a: "was eating / rang" }
        ];

        let currentIdx = 0;

        function loadQuestion() {
            document.getElementById('sentence-display').innerText = questions[currentIdx].q;
            document.getElementById('user-input').value = "";
            document.getElementById('feedback').innerText = "";
            document.getElementById('next-btn').style.display = "none";
            document.getElementById('progress').innerText = `Progress: ${currentIdx + 1}/10`;
        }

        function checkAnswer() {
            const userVal = document.getElementById('user-input').value.toLowerCase().trim();
            const correctVal = questions[currentIdx].a.toLowerCase().trim();
            const feedback = document.getElementById('feedback');

            if (userVal === correctVal) {
                feedback.innerText = "ACCESS GRANTED: Correct answer.";
                feedback.className = "feedback correct";
                document.getElementById('next-btn').style.display = "block";
            } else {
                feedback.innerText = "ACCESS DENIED: Try again.";
                feedback.className = "feedback error";
            }
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < questions.length) {
                loadQuestion();
            } else {
                document.querySelector('.card').innerHTML = "<h2>TEST COMPLETE</h2><p>You are ready for tomorrow!</p><button onclick='location.reload()'>RESTART</button>";
            }
        }

        // Allow "Enter" key to submit
        document.getElementById('user-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') checkAnswer();
        });

        loadQuestion();
    </script>
</body>
</html>
