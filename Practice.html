<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Exam Prep</title>
    <style>
        :root { --primary: #4f46e5; --success: #22c55e; --error: #ef4444; --bg: #f8fafc; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; padding: 20px; }
        .app-card { background: white; width: 100%; max-width: 450px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 24px; min-height: 450px; display: flex; flex-direction: column; }
        .progress-bar { width: 100%; height: 6px; background: #e2e8f0; border-radius: 3px; margin-bottom: 10px; overflow: hidden; }
        #progress-fill { height: 100%; background: var(--primary); transition: width 0.3s; width: 0%; }
        .section-label { color: #64748b; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .q-text { font-size: 1.1rem; color: #1e293b; font-weight: 600; line-height: 1.5; margin-bottom: 20px; }
        
        /* Input & Option Styles */
        .input-group { display: flex; flex-direction: column; gap: 10px; }
        input { border: 2px solid #e2e8f0; border-radius: 12px; padding: 14px; font-size: 1rem; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--primary); }
        .options-grid { display: flex; flex-direction: column; gap: 10px; }
        .option-btn { border: 2px solid #e2e8f0; border-radius: 12px; padding: 15px; font-size: 1rem; background: white; cursor: pointer; text-align: left; }
        .correct-pick { border-color: var(--success); background: #dcfce7; color: #166534; }
        .wrong-pick { border-color: var(--error); background: #fee2e2; color: #991b1b; }

        .feedback { margin: 15px 0; text-align: center; font-weight: 600; min-height: 24px; }
        .btn-main { background: var(--primary); color: white; border: none; border-radius: 12px; padding: 16px; font-weight: bold; width: 100%; cursor: pointer; margin-top: auto; }
        #next-btn { background: #1e293b; display: none; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="progress-bar"><div id="progress-fill"></div></div>
    <div id="section-title" class="section-label">Practice</div>
    <div id="question" class="q-text"></div>
    <div id="action-area"></div>
    <div id="feedback" class="feedback"></div>
    <button id="submit-btn" class="btn-main" onclick="checkAnswer()">Check Answer</button>
    <button id="next-btn" class="btn-main" onclick="nextQuestion()">Continue →</button>
</div>

<script>
const quizData = [
    // TYPING SECTION
    { type: 'type', cat: "Past Simple vs Continuous", q: "1. I (read) ____ a book when suddenly the lights (go) ____ out.", a: ["was reading", "went"] },
    { type: 'type', cat: "Past Simple vs Continuous", q: "2. While the students (write) ____ their essays, the fire alarm (start) ____ to ring.", a: ["were writing", "started"] },
    { type: 'type', cat: "Past Simple vs Continuous", q: "3. My mother (cook) ____ dinner while my father (wash) ____ the car.", a: ["was cooking", "was washing"] },
    { type: 'type', cat: "Past Simple vs Continuous", q: "4. When I (arrive) ____ at the party, everyone (dance) ____ and singing.", a: ["arrived", "was dancing"] },
    { type: 'type', cat: "Past Simple vs Continuous", q: "5. He (break) ____ his leg while he (ski) ____ in the Alps.", a: ["broke", "was skiing"] },
    { type: 'type', cat: "Past Simple vs Continuous", q: "6. The phone (ring) ____ three times while I (take) ____ a shower.", a: ["rang", "was taking"] },
    { type: 'type', cat: "Past Simple vs Continuous", q: "7. What (you / do) ____ when the accident (happen) ____?", a: ["were you doing", "happened"] },
    { type: 'type', cat: "Past Simple vs Continuous", q: "8. I (not / see) ____ the thief because I (sleep) ____ on the sofa.", a: ["didn't see", "was sleeping"] },
    { type: 'type', cat: "Past Simple vs Continuous", q: "9. It (begin) ____ to rain just as we (leave) ____ the house.", a: ["began", "were leaving"] },
    { type: 'type', cat: "Past Simple vs Continuous", q: "10. Yesterday at 7:00 PM, I (eat) ____ dinner, while my phone (ring) ____.", a: ["was eating", "rang"] },
    
    // CHOOSING SECTION
    { type: 'choose', cat: "Past Simple vs Past Perfect", q: "11. By the time we arrived at the cinema, the movie...", o: ["started", "had started"], a: 1 },
    { type: 'choose', cat: "Past Simple vs Past Perfect", q: "12. I didn't have any money because I... my wallet.", o: ["lost", "had lost"], a: 1 },
    { type: 'choose', cat: "Past Simple vs Past Perfect", q: "13. The teacher was happy because the students...", o: ["studied", "had studied"], a: 1 },
    { type: 'choose', cat: "Past Simple vs Past Perfect", q: "14. After the guests..., I cleaned the house.", o: ["left", "had left"], a: 1 },
    { type: 'choose', cat: "Past Simple vs Past Perfect", q: "15. The streets were wet because it... all night.", o: ["rained", "had rained"], a: 1 },
    { type: 'choose', cat: "Past Simple vs Past Perfect", q: "16. I failed the test because I... my notes at home.", o: ["forgot", "had forgotten"], a: 1 },
    { type: 'choose', cat: "Past Simple vs Past Perfect", q: "17. When I arrived at the station, the train...", o: ["already left", "had already left"], a: 1 },
    { type: 'choose', cat: "Past Simple vs Past Perfect", q: "18. He was very tired because he... for 10 hours.", o: ["worked", "had worked"], a: 1 },
    { type: 'choose', cat: "Past Simple vs Past Perfect", q: "19. I didn't recognize her because she... her hair.", o: ["cut", "had cut"], a: 1 },
    { type: 'choose', cat: "Past Simple vs Past Perfect", q: "20. They... the movie before, so they knew the ending.", o: ["saw", "had seen"], a: 1 }
];

let current = 0;

function render() {
    const data = quizData[current];
    document.getElementById('section-title').innerText = data.cat;
    document.getElementById('question').innerText = data.q;
    document.getElementById('progress-fill').style.width = ((current + 1) / quizData.length * 100) + "%";
    document.getElementById('feedback').innerText = "";
    document.getElementById('next-btn').style.display = "none";
    
    const area = document.getElementById('action-area');
    area.innerHTML = "";

    if (data.type === 'type') {
        document.getElementById('submit-btn').style.display = "block";
        data.a.forEach((_, i) => {
            const inp = document.createElement('input');
            inp.placeholder = `Answer for blank ${i+1}...`;
            inp.id = `input-${i}`;
            inp.autocomplete = "off";
            area.appendChild(inp);
        });
    } else {
        document.getElementById('submit-btn').style.display = "none";
        const grid = document.createElement('div');
        grid.className = "options-grid";
        data.o.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = "option-btn";
            btn.innerText = opt;
            btn.onclick = () => checkChoice(i, btn);
            grid.appendChild(btn);
        });
        area.appendChild(grid);
    }
}

function checkAnswer() {
    const data = quizData[current];
    let correct = true;
    data.a.forEach((ans, i) => {
        if (document.getElementById(`input-${i}`).value.trim().toLowerCase() !== ans.toLowerCase()) correct = false;
    });
    showResult(correct);
}

function checkChoice(idx, btn) {
    const data = quizData[current];
    const btns = document.querySelectorAll('.option-btn');
    btns.forEach(b => b.style.pointerEvents = 'none');
    if (idx === data.a) {
        btn.classList.add('correct-pick');
        showResult(true);
    } else {
        btn.classList.add('wrong-pick');
        btns[data.a].classList.add('correct-pick');
        showResult(false);
    }
}

function showResult(isCorrect) {
    const f = document.getElementById('feedback');
    f.innerText = isCorrect ? "Correct! ✨" : "Check your spelling/logic.";
    f.style.color = isCorrect ? "var(--success)" : "var(--error)";
    if (isCorrect) {
        document.getElementById('submit-btn').style.display = "none";
        document.getElementById('next-btn').style.display = "block";
    }
}

function nextQuestion() {
    current++;
    if (current < quizData.length) render();
    else document.querySelector('.app-card').innerHTML = "<h2>All Done! 🏆</h2><p>You are ready for the test!</p>";
}

render();
</script>
</body>
</html>
