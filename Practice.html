<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete English Revision</title>
    <style>
        :root { --primary: #4f46e5; --success: #22c55e; --error: #ef4444; --bg: #f8fafc; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; padding: 20px; color: #1e293b; }
        .app-card { background: white; width: 100%; max-width: 500px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 24px; min-height: 550px; display: flex; flex-direction: column; }
        .progress-bar { width: 100%; height: 8px; background: #e2e8f0; border-radius: 4px; margin-bottom: 10px; overflow: hidden; }
        #progress-fill { height: 100%; background: var(--primary); transition: width 0.4s; width: 0%; }
        .section-tag { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; color: var(--primary); letter-spacing: 1px; margin-bottom: 5px; }
        .q-text { font-size: 1.15rem; font-weight: 600; line-height: 1.5; margin-bottom: 20px; }
        .interaction { flex-grow: 1; }
        input { width: 100%; border: 2px solid #e2e8f0; border-radius: 12px; padding: 14px; font-size: 1rem; margin-bottom: 12px; outline: none; box-sizing: border-box; transition: 0.2s; }
        input:focus { border-color: var(--primary); }
        .options-grid { display: flex; flex-direction: column; gap: 10px; }
        .opt-btn { border: 2px solid #e2e8f0; border-radius: 12px; padding: 16px; font-size: 1rem; background: white; cursor: pointer; text-align: left; font-weight: 500; transition: 0.2s; }
        .opt-btn.correct-pick { border-color: var(--success); background: #dcfce7; color: #166534; }
        .opt-btn.wrong-pick { border-color: var(--error); background: #fee2e2; color: #991b1b; }
        .feedback { text-align: center; font-weight: 700; min-height: 24px; margin: 20px 0; padding: 10px; border-radius: 8px; }
        .main-btn { background: var(--primary); color: white; border: none; border-radius: 12px; padding: 18px; font-weight: 700; width: 100%; cursor: pointer; font-size: 1rem; }
        #next-btn { background: #1e293b; display: none; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="progress-bar"><div id="progress-fill"></div></div>
    <div class="section-tag" id="section-name">Grammar</div>
    <div class="q-text" id="question-text">Loading...</div>

    <div class="interaction" id="interaction-area"></div>
    <div id="feedback" class="feedback"></div>

    <button id="submit-btn" class="main-btn" onclick="checkTypeAnswer()">Check Answer</button>
    <button id="next-btn" class="main-btn" onclick="goToNext()">Continue →</button>
</div>

<script>
// Data includes all previous tasks + specific passive requested
const initialQuiz = [
    { cat: "Past Simple vs Past Continuous", type: "type", q: "I (read) ____ a book when suddenly the lights (go) ____ out.", a: ["was reading", "went"] },
    { cat: "Past Simple vs Past Continuous", type: "type", q: "While the students (write) ____ their essays, the fire alarm (start) ____ to ring.", a: ["were writing", "started"] },
    { cat: "Past Simple vs Past Continuous", type: "type", q: "My mother (cook) ____ dinner while my father (wash) ____ the car in the garden.", a: ["was cooking", "was washing"] },
    { cat: "Past Simple vs Past Continuous", type: "type", q: "When I (arrive) ____ at the party, everyone (dance) ____ and singing.", a: ["arrived", "was dancing"] },
    { cat: "Past Simple vs Past Continuous", type: "type", q: "He (break) ____ his leg while he (ski) ____ in the Alps last winter.", a: ["broke", "was skiing"] },
    { cat: "Past Simple vs Past Continuous", type: "type", q: "The phone (ring) ____ three times while I (take) ____ a shower.", a: ["rang", "was taking"] },
    { cat: "Past Simple vs Past Continuous", type: "type", q: "What (you / do) ____ when the accident (happen) ____?", a: ["were you doing", "happened"] },
    { cat: "Past Simple vs Past Continuous", type: "type", q: "I (not / see) ____ the thief because I (sleep) ____ on the sofa.", a: ["didn't see", "was sleeping"] },
    { cat: "Past Simple vs Past Continuous", type: "type", q: "It (begin) ____ to rain just as we (leave) ____ the house.", a: ["began", "were leaving"] },
    { cat: "Past Simple vs Past Continuous", type: "type", q: "Yesterday at 7:00 PM, I (eat) ____ dinner, while my phone (ring) ____.", a: ["was eating", "rang"] },
    
    // Choosing tasks
    { cat: "Past Perfect vs Past Simple", type: "choice", q: "By the time we arrived at the cinema, the movie...", o: ["started", "had started"], a: 1 },
    { cat: "Past Perfect vs Past Simple", type: "choice", q: "I didn't have any money because I... my wallet.", o: ["lost", "had lost"], a: 1 },
    { cat: "Past Perfect vs Past Simple", type: "choice", q: "The teacher was happy because the students...", o: ["studied", "had studied"], a: 1 },
    { cat: "Past Perfect vs Past Simple", type: "choice", q: "After the guests..., I cleaned the house.", o: ["left", "had left"], a: 1 },
    { cat: "Past Perfect vs Past Simple", type: "choice", q: "The streets are wet because it... all night.", o: ["rained", "had rained"], a: 0 },
    { cat: "Used to vs Past Simple", type: "choice", q: "When I was five, I ____ (have) a tricycle.", o: ["used to have", "had"], a: 0 },
    
    // Passive (The requested specific logic)
    { cat: "Passive Voice", type: "type", q: "The police caught the robbers. -> The robbers ____.", a: ["were caught by the police"] },
    { cat: "Passive Voice", type: "type", q: "Alexander Graham Bell invented the telephone. -> The telephone ____.", a: ["was invented by Alexander Graham Bell"] },
    { cat: "Passive Voice", type: "type", q: "Someone stole my lunch! -> My lunch ____.", a: ["was stolen by someone"] },
    { cat: "Passive Voice", type: "type", q: "Nowadays we don't use CDs. -> CDs ____.", a: ["aren't used nowadays"] },
    
    // Conditionals
    { cat: "First and Second Conditionals", type: "choice", q: "If it (rain) tomorrow, we (cancel) the picnic.", o: ["rains / will cancel", "rained / would cancel"], a: 0 },
    { cat: "Third Conditional", type: "choice", q: "I didn't wake up early, so I missed the bus.", o: ["If I woke up early, I didn't miss it.", "If I had woken up early, I wouldn't have missed it."], a: 1 }
];

let activeQueue = [...initialQuiz];
let currentIndex = 0;
let lastCorrect = false;

// Broad normalization: lowercase, no punctuation, handles short forms
function normalize(str) {
    if(!str) return "";
    return str.toLowerCase()
              .replace(/n't/g, " not")
              .replace(/'re/g, " are")
              .replace(/'s/g, " is")
              .replace(/'m/g, " am")
              .replace(/'ll/g, " will")
              .replace(/[.,!?;:]/g, "")
              .replace(/\s+/g, " ")
              .trim();
}

function loadTask() {
    const data = activeQueue[currentIndex];
    document.getElementById('section-name').innerText = data.cat;
    document.getElementById('question-text').innerText = data.q;
    
    const total = initialQuiz.length;
    const finished = total - activeQueue.length;
    document.getElementById('progress-fill').style.width = `${((finished + currentIndex) / total) * 100}%`;
    
    document.getElementById('feedback').innerText = "";
    document.getElementById('feedback').style.background = "transparent";
    document.getElementById('next-btn').style.display = "none";
    
    const area = document.getElementById('interaction-area');
    area.innerHTML = "";

    if (data.type === "type") {
        document.getElementById('submit-btn').style.display = "block";
        data.a.forEach((_, i) => {
            const input = document.createElement('input');
            input.id = `user-ans-${i}`;
            input.placeholder = `Type your answer...`;
            input.autocomplete = "off";
            area.appendChild(input);
        });
    } else {
        document.getElementById('submit-btn').style.display = "none";
        const grid = document.createElement('div');
        grid.className = "options-grid";
        data.o.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = "opt-btn";
            btn.innerText = opt;
            btn.onclick = () => checkChoice(i, btn);
            grid.appendChild(btn);
        });
        area.appendChild(grid);
    }
}

function checkTypeAnswer() {
    const data = activeQueue[currentIndex];
    let isCorrect = true;
    data.a.forEach((ans, i) => {
        const user = document.getElementById(`user-ans-${i}`).value;
        if (normalize(user) !== normalize(ans)) isCorrect = false;
    });
    handleResult(isCorrect);
}

function checkChoice(idx, btn) {
    const data = activeQueue[currentIndex];
    const btns = document.querySelectorAll('.opt-btn');
    btns.forEach(b => b.style.pointerEvents = 'none');
    
    if (idx === data.a) {
        btn.classList.add('correct-pick');
        handleResult(true);
    } else {
        btn.classList.add('wrong-pick');
        btns[data.a].classList.add('correct-pick');
        handleResult(false);
    }
}

function handleResult(isCorrect) {
    const f = document.getElementById('feedback');
    lastCorrect = isCorrect;
    
    if (isCorrect) {
        f.innerText = "Correct! Well done. ✨";
        f.style.color = "var(--success)";
        f.style.background = "#dcfce7";
    } else {
        f.innerText = "Not quite. This will recur later. 🔄";
        f.style.color = "var(--error)";
        f.style.background = "#fee2e2";
        // Recurrence logic: add the current object to the end of the queue
        activeQueue.push({...activeQueue[currentIndex]});
    }
    
    document.getElementById('submit-btn').style.display = "none";
    document.getElementById('next-btn').style.display = "block";
}

function goToNext() {
    if (lastCorrect) {
        activeQueue.splice(currentIndex, 1);
    } else {
        currentIndex++;
    }

    if (activeQueue.length > 0) {
        if (currentIndex >= activeQueue.length) currentIndex = 0;
        loadTask();
    } else {
        document.querySelector('.app-card').innerHTML = `
            <div style="text-align:center; padding: 50px 0;">
                <h1 style="font-size: 4rem;">🏆</h1>
                <h2>Perfect!</h2>
                <p>You have mastered every single question.</p>
                <button class="main-btn" onclick="location.reload()" style="margin-top: 20px;">Restart Quiz</button>
            </div>`;
    }
}

loadTask();
</script>
</body>
</html>
