<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Pro Practice</title>
    <style>
        :root { --primary: #4f46e5; --success: #22c55e; --error: #ef4444; --bg: #f8fafc; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; padding: 20px; }
        .app-card { background: white; width: 100%; max-width: 450px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 24px; position: relative; }
        .progress-bar { width: 100%; height: 6px; background: #e2e8f0; border-radius: 3px; margin-bottom: 20px; overflow: hidden; }
        #progress-fill { height: 100%; background: var(--primary); transition: width 0.3s; width: 10%; }
        .q-text { font-size: 1.2rem; color: #1e293b; font-weight: 600; line-height: 1.5; margin-bottom: 24px; }
        .input-group { display: flex; flex-direction: column; gap: 12px; }
        input { border: 2px solid #e2e8f0; border-radius: 12px; padding: 14px; font-size: 1rem; outline: none; transition: 0.2s; -webkit-appearance: none; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        .btn { background: var(--primary); color: white; border: none; border-radius: 12px; padding: 16px; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 10px; width: 100%; }
        .feedback { margin-top: 16px; text-align: center; font-weight: 500; min-height: 24px; }
        .correct { color: var(--success); }
        .wrong { color: var(--error); }
        .next-btn { background: #1e293b; display: none; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="progress-bar"><div id="progress-fill"></div></div>
    
    <div id="game-ui">
        <div class="q-text" id="question">Loading...</div>
        
        <div class="input-group" id="input-container">
            <!-- Inputs generated by JS -->
        </div>

        <div id="feedback" class="feedback"></div>
        
        <button id="submit-btn" class="btn" onclick="check()">Check Answer</button>
        <button id="next-btn" class="btn next-btn" onclick="next()">Continue →</button>
    </div>
</div>

<script>
const tasks = [
    { q: "1. I (read) ____ a book when suddenly the lights (go) ____ out.", a: ["was reading", "went"] },
    { q: "2. While the students (write) ____ their essays, the fire alarm (start) ____ to ring.", a: ["were writing", "started"] },
    { q: "3. My mother (cook) ____ dinner while my father (wash) ____ the car.", a: ["was cooking", "was washing"] },
    { q: "4. When I (arrive) ____ at the party, everyone (dance) ____ and singing.", a: ["arrived", "was dancing"] },
    { q: "5. He (break) ____ his leg while he (ski) ____ in the Alps.", a: ["broke", "was skiing"] },
    { q: "6. The phone (ring) ____ three times while I (take) ____ a shower.", a: ["rang", "was taking"] },
    { q: "7. What (you / do) ____ when the accident (happen) ____?", a: ["were you doing", "happened"] },
    { q: "8. I (not / see) ____ the thief because I (sleep) ____ on the sofa.", a: ["didn't see", "was sleeping"] },
    { q: "9. It (begin) ____ to rain just as we (leave) ____ the house.", a: ["began", "were leaving"] },
    { q: "10. Yesterday at 7:00 PM, I (eat) ____ dinner, while my phone (ring) ____.", a: ["was eating", "rang"] }
];

let current = 0;

function setup() {
    const t = tasks[current];
    document.getElementById('question').innerText = t.q;
    document.getElementById('progress-fill').style.width = ((current + 1) / tasks.length * 100) + "%";
    
    const container = document.getElementById('input-container');
    container.innerHTML = '';
    t.a.forEach((_, i) => {
        const inp = document.createElement('input');
        inp.placeholder = t.a.length > 1 ? `Blank ${i+1}...` : "Type answer here...";
        inp.id = `ans-${i}`;
        inp.autocomplete = "off";
        container.appendChild(inp);
    });
    
    document.getElementById('feedback').innerText = "";
    document.getElementById('submit-btn').style.display = "block";
    document.getElementById('next-btn').style.display = "none";
}

function check() {
    const t = tasks[current];
    let allCorrect = true;
    
    t.a.forEach((correctAnswer, i) => {
        const userValue = document.getElementById(`ans-${i}`).value.trim().toLowerCase();
        if (userValue !== correctAnswer.toLowerCase()) allCorrect = false;
    });

    const f = document.getElementById('feedback');
    if (allCorrect) {
        f.innerText = "Excellent! ✨";
        f.className = "feedback correct";
        document.getElementById('submit-btn').style.display = "none";
        document.getElementById('next-btn').style.display = "block";
    } else {
        f.innerText = "Keep trying! Check your spelling.";
        f.className = "feedback wrong";
    }
}

function next() {
    current++;
    if (current < tasks.length) {
        setup();
    } else {
        document.getElementById('game-ui').innerHTML = "<div class='q-text' style='text-align:center'>🎉 Practice Complete!<br><small>You're ready for the test!</small></div>";
    }
}

setup();
</script>

</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Past Tense Master</title>
    <style>
        :root { --primary: #6366f1; --success: #22c55e; --error: #ef4444; --bg: #f8fafc; --card: #ffffff; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; padding: 20px; }
        .app-card { background: var(--card); width: 100%; max-width: 450px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); padding: 24px; min-height: 420px; display: flex; flex-direction: column; }
        .progress-bar { width: 100%; height: 8px; background: #e2e8f0; border-radius: 4px; margin-bottom: 12px; overflow: hidden; }
        #progress-fill { height: 100%; background: var(--primary); transition: width 0.4s ease; width: 0%; }
        .label { color: #64748b; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 20px; }
        .q-text { font-size: 1.2rem; color: #1e293b; font-weight: 600; line-height: 1.6; margin-bottom: 30px; flex-grow: 1; }
        .options-grid { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .option-btn { border: 2px solid #f1f5f9; border-radius: 16px; padding: 18px; font-size: 1.05rem; background: #f8fafc; cursor: pointer; transition: all 0.2s ease; text-align: left; font-weight: 500; color: #334155; }
        .option-btn:active { transform: scale(0.98); }
        .correct-pick { border-color: var(--success) !important; background: #dcfce7 !important; color: #166534; }
        .wrong-pick { border-color: var(--error) !important; background: #fee2e2 !important; color: #991b1b; }
        .feedback { text-align: center; font-weight: 700; height: 24px; margin-bottom: 20px; transition: 0.2s; }
        .btn-next { background: #1e293b; color: white; border: none; border-radius: 16px; padding: 18px; font-weight: 700; width: 100%; cursor: pointer; display: none; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="progress-bar"><div id="progress-fill"></div></div>
    <div class="label">Past Simple vs. Past Perfect</div>
    
    <div class="q-text" id="question">Loading...</div>
    
    <div class="options-grid" id="options"></div>

    <div id="feedback" class="feedback"></div>
    
    <button id="next-btn" class="btn-next" onclick="next()">Continue →</button>
</div>

<script>
const tasks = [
    { q: "By the time we arrived at the cinema, the movie...", o: ["started", "had started"], a: 1 },
    { q: "I didn't have any money because I... my wallet.", o: ["lost", "had lost"], a: 1 },
    { q: "The teacher was happy because the students...", o: ["studied", "had studied"], a: 1 },
    { q: "After the guests..., I cleaned the house.", o: ["left", "had left"], a: 1 },
    { q: "The streets were wet because it... all night.", o: ["rained", "had rained"], a: 1 },
    { q: "I failed the test because I... my notes at home.", o: ["forgot", "had forgotten"], a: 1 },
    { q: "When I arrived at the station, the train...", o: ["already left", "had already left"], a: 1 },
    { q: "He was very tired because he... for 10 hours.", o: ["worked", "had worked"], a: 1 },
    { q: "I didn't recognize her because she... her hair.", o: ["cut", "had cut"], a: 1 },
    { q: "They... the movie before, so they knew the ending.", o: ["saw", "had seen"], a: 1 }
];

let current = 0;

function setup() {
    const t = tasks[current];
    document.getElementById('question').innerText = t.q;
    document.getElementById('progress-fill').style.width = ((current + 1) / tasks.length * 100) + "%";
    
    const optionsDiv = document.getElementById('options');
    optionsDiv.innerHTML = '';
    
    t.o.forEach((option, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = option;
        btn.onclick = () => check(i, btn);
        optionsDiv.appendChild(btn);
    });
    
    document.getElementById('feedback').innerText = "";
    document.getElementById('next-btn').style.display = "none";
}

function check(index, btn) {
    const t = tasks[current];
    const feedback = document.getElementById('feedback');
    const buttons = document.querySelectorAll('.option-btn');
    
    buttons.forEach(b => b.style.pointerEvents = 'none');

    if (index === t.a) {
        btn.classList.add('correct-pick');
        feedback.innerText = "Correct! ✨";
        feedback.style.color = "var(--success)";
    } else {
        btn.classList.add('wrong-pick');
        buttons[t.a].classList.add('correct-pick');
        feedback.innerText = "This happened earlier!";
        feedback.style.color = "var(--error)";
    }
    document.getElementById('next-btn').style.display = "block";
}

function next() {
    current++;
    if (current < tasks.length) {
        setup();
    } else {
        document.querySelector('.app-card').innerHTML = `
            <div style="text-align:center; padding: 40px 0;">
                <h1 style="font-size: 3rem; margin: 0;">🎯</h1>
                <h2 style="color:#1e293b; margin: 20px 0 10px;">10/10 Complete!</h2>
                <p style="color:#64748b; margin-bottom: 30px;">You are ready for tomorrow's test.</p>
                <button class="btn-next" style="display:block" onclick="location.reload()">Restart Practice</button>
            </div>
        `;
    }
}

setup();
</script>
</body>
</html>
