<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Pro Practice</title>
    <style>
        :root { --primary: #4f46e5; --success: #22c55e; --error: #ef4444; --bg: #f8fafc; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; padding: 20px; }
        .app-card { background: white; width: 100%; max-width: 450px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 24px; position: relative; }
        .progress-bar { width: 100%; height: 6px; background: #e2e8f0; border-radius: 3px; margin-bottom: 20px; overflow: hidden; }
        #progress-fill { height: 100%; background: var(--primary); transition: width 0.3s; width: 10%; }
        .q-text { font-size: 1.2rem; color: #1e293b; font-weight: 600; line-height: 1.5; margin-bottom: 24px; }
        .input-group { display: flex; flex-direction: column; gap: 12px; }
        input { border: 2px solid #e2e8f0; border-radius: 12px; padding: 14px; font-size: 1rem; outline: none; transition: 0.2s; -webkit-appearance: none; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        .btn { background: var(--primary); color: white; border: none; border-radius: 12px; padding: 16px; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 10px; width: 100%; }
        .feedback { margin-top: 16px; text-align: center; font-weight: 500; min-height: 24px; }
        .correct { color: var(--success); }
        .wrong { color: var(--error); }
        .next-btn { background: #1e293b; display: none; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="progress-bar"><div id="progress-fill"></div></div>
    
    <div id="game-ui">
        <div class="q-text" id="question">Loading...</div>
        
        <div class="input-group" id="input-container">
            <!-- Inputs generated by JS -->
        </div>

        <div id="feedback" class="feedback"></div>
        
        <button id="submit-btn" class="btn" onclick="check()">Check Answer</button>
        <button id="next-btn" class="btn next-btn" onclick="next()">Continue →</button>
    </div>
</div>

<script>
const tasks = [
    { q: "1. I (read) ____ a book when suddenly the lights (go) ____ out.", a: ["was reading", "went"] },
    { q: "2. While the students (write) ____ their essays, the fire alarm (start) ____ to ring.", a: ["were writing", "started"] },
    { q: "3. My mother (cook) ____ dinner while my father (wash) ____ the car.", a: ["was cooking", "was washing"] },
    { q: "4. When I (arrive) ____ at the party, everyone (dance) ____ and singing.", a: ["arrived", "was dancing"] },
    { q: "5. He (break) ____ his leg while he (ski) ____ in the Alps.", a: ["broke", "was skiing"] },
    { q: "6. The phone (ring) ____ three times while I (take) ____ a shower.", a: ["rang", "was taking"] },
    { q: "7. What (you / do) ____ when the accident (happen) ____?", a: ["were you doing", "happened"] },
    { q: "8. I (not / see) ____ the thief because I (sleep) ____ on the sofa.", a: ["didn't see", "was sleeping"] },
    { q: "9. It (begin) ____ to rain just as we (leave) ____ the house.", a: ["began", "were leaving"] },
    { q: "10. Yesterday at 7:00 PM, I (eat) ____ dinner, while my phone (ring) ____.", a: ["was eating", "rang"] }
];

let current = 0;

function setup() {
    const t = tasks[current];
    document.getElementById('question').innerText = t.q;
    document.getElementById('progress-fill').style.width = ((current + 1) / tasks.length * 100) + "%";
    
    const container = document.getElementById('input-container');
    container.innerHTML = '';
    t.a.forEach((_, i) => {
        const inp = document.createElement('input');
        inp.placeholder = t.a.length > 1 ? `Blank ${i+1}...` : "Type answer here...";
        inp.id = `ans-${i}`;
        inp.autocomplete = "off";
        container.appendChild(inp);
    });
    
    document.getElementById('feedback').innerText = "";
    document.getElementById('submit-btn').style.display = "block";
    document.getElementById('next-btn').style.display = "none";
}

function check() {
    const t = tasks[current];
    let allCorrect = true;
    
    t.a.forEach((correctAnswer, i) => {
        const userValue = document.getElementById(`ans-${i}`).value.trim().toLowerCase();
        if (userValue !== correctAnswer.toLowerCase()) allCorrect = false;
    });

    const f = document.getElementById('feedback');
    if (allCorrect) {
        f.innerText = "Excellent! ✨";
        f.className = "feedback correct";
        document.getElementById('submit-btn').style.display = "none";
        document.getElementById('next-btn').style.display = "block";
    } else {
        f.innerText = "Keep trying! Check your spelling.";
        f.className = "feedback wrong";
    }
}

function next() {
    current++;
    if (current < tasks.length) {
        setup();
    } else {
        document.getElementById('game-ui').innerHTML = "<div class='q-text' style='text-align:center'>🎉 Practice Complete!<br><small>You're ready for the test!</small></div>";
    }
}

setup();
</script>

</body>
</html>
