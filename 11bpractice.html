<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizizz Class Challenge!</title>
    <style>
        :root {
            --quizizz-purple: #461a42;
            --quizizz-light: #8854c0;
            --quizizz-button: #2d132c;
            --success: #00c985;
            --danger: #ff4552;
            --bg: #1e0322;
            --card: #2b0b30;
            --text: #ffffff;
        }

        body {
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            overflow-x: hidden;
        }

        .quizizz-container {
            width: 100%;
            max-width: 850px;
            background: var(--card);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            padding: 30px;
            box-sizing: border-box;
            border: 4px solid var(--quizizz-light);
            text-align: center;
            position: relative;
        }

        /* Quizizz Top HUD */
        .hud-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .task-tag {
            background: var(--quizizz-light);
            padding: 6px 14px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-box {
            font-size: 1.4rem;
            font-weight: bold;
            color: #ffca28;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* Streak / Combo Counter */
        .streak-banner {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ff9100;
            margin-bottom: 10px;
            min-height: 24px;
            transition: all 0.3s ease;
        }

        /* Progress Tracker Bar */
        .progress-container {
            width: 100%;
            background: #461a42;
            height: 14px;
            border-radius: 7px;
            margin-bottom: 25px;
            overflow: hidden;
            border: 2px solid #5d2558;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff4552, #8854c0, #00c985);
            transition: width 0.4s ease-out;
        }

        /* Question Box */
        .instruction-text {
            font-size: 1.1rem;
            color: #b9a3be;
            margin-bottom: 15px;
            font-style: italic;
        }

        .question-card {
            background: var(--quizizz-purple);
            padding: 30px 20px;
            border-radius: 16px;
            font-size: 1.8rem;
            font-weight: bold;
            line-height: 1.4;
            margin-bottom: 30px;
            border-bottom: 6px solid #31112e;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .gap-fill {
            color: #ffca28;
            text-decoration: underline;
        }

        /* 3 Choices Layout (Large Quizizz Style Buttons) */
        .choices-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .quizizz-btn {
            background: var(--quizizz-button);
            color: white;
            border: 3px solid #52264e;
            border-radius: 16px;
            padding: 20px 25px;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s ease;
            text-align: center;
            touch-action: manipulation;
            box-shadow: 0 6px 0 #1b0a1a;
            position: relative;
        }

        .quizizz-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #1b0a1a;
        }

        /* Quizizz Interactive States */
        .quizizz-btn.correct {
            background-color: var(--success) !important;
            border-color: #00ebd3 !important;
            box-shadow: 0 6px 0 #00875a !important;
            color: white !important;
            transform: scale(1.02);
        }

        .quizizz-btn.wrong {
            background-color: var(--danger) !important;
            border-color: #ff7680 !important;
            box-shadow: 0 6px 0 #b3242e !important;
            color: white !important;
            opacity: 0.7;
        }

        /* Next Screen Action button */
        .next-panel {
            margin-top: 25px;
            min-height: 60px;
        }

        .action-btn {
            background: #ffffff;
            color: var(--bg);
            border: none;
            padding: 14px 40px;
            font-size: 1.4rem;
            font-weight: 900;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 5px 0 #cccccc;
            display: none;
            margin: 0 auto;
        }

        .action-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #cccccc;
        }

        /* Leaderboard / End Game Screen */
        .end-screen {
            display: none;
            padding: 30px 10px;
        }

        .trophy {
            font-size: 5rem;
            margin-bottom: 15px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .final-score {
            font-size: 4.5rem;
            font-weight: 900;
            color: #ffca28;
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <div class="quizizz-container">
        <!-- Live Game Mode -->
        <div id="game-arena">
            <div class="hud-panel">
                <div class="task-tag" id="hud-task">Task 1: Grammar</div>
                <div class="score-box" id="hud-score">✨ 0 Points</div>
            </div>

            <div class="streak-banner" id="streak-box">🔥 Combo Streak: 0</div>

            <div class="progress-container">
                <div class="progress-bar" id="progress-indicator"></div>
            </div>

            <div class="instruction-text" id="hud-instruction">Instruction loading...</div>
            <div class="question-card" id="hud-question">Question placeholder text...</div>

            <!-- Quizizz format: exactly 3 choice fields -->
            <div class="choices-grid" id="choices-box">
                <button class="quizizz-btn">Choice 1</button>
                <button class="quizizz-btn">Choice 2</button>
                <button class="quizizz-btn">Choice 3</button>
            </div>

            <div class="next-panel">
                <button class="action-btn" id="next-btn" onclick="moveToNext()">Next Question ⚡</button>
            </div>
        </div>

        <!-- End Game Mode -->
        <div id="end-arena" class="end-screen">
            <div class="trophy">🏆</div>
            <h1 style="font-size: 2.5rem; color: white;">Game Over!</h1>
            <p style="font-size: 1.4rem; color: #b9a3be;">Awesome job reviewing on our last day of school!</p>
            <div class="final-score" id="final-tally">0 / 0</div>
            <h2 id="final-comment" style="color: #ffca28;">⭐⭐⭐</h2>
            <button class="quizizz-btn" style="margin-top: 30px; background: var(--success); box-shadow: 0 6px 0 #00875a;" onclick="location.reload()">Play Again 🔄</button>
        </div>
    </div>

    <script>
        // Custom 3-choice map matching your original structural content parameters
        const quizizzData = [
            // --- TASK 1 ---
            { task: "Task 1: Grammar", inst: "Complete the sentences. Choose the correct form of the verb.", q: "You’re late! I <span class='gap-fill'>______________</span> here in the cold for 20 minutes.", options: ["stood", "have been standing", "am standing"], ans: "have been standing" },
            { task: "Task 1: Grammar", inst: "Complete the sentences. Choose the correct form of the verb.", q: "If you don’t buy the tickets soon, they <span class='gap-fill'>______________</span> out.", options: ["will sell", "sell", "sold"], ans: "will sell" },
            { task: "Task 1: Grammar", inst: "Complete the sentences. Choose the correct form of the verb.", q: "Pretending <span class='gap-fill'>______________</span> injured in a tackle is a bad idea.", options: ["being", "to be", "be"], ans: "to be" },
            { task: "Task 1: Grammar", inst: "Complete the sentences. Choose the correct form of the verb.", q: "What <span class='gap-fill'>______________</span> you doing when I called you earlier?", options: ["were", "did", "are"], ans: "were" },
            { task: "Task 1: Grammar", inst: "Complete the sentences. Choose the correct form of the verb.", q: "Tim’s a freelance software designer. He <span class='gap-fill'>______________</span> for himself since 2016.", options: ["works", "has been working", "is working"], ans: "has been working" },
            { task: "Task 1: Grammar", inst: "Complete the sentences. Choose the correct form of the verb.", q: "Andrew <span class='gap-fill'>______________</span> Nepal in 2014, the year before the earthquake.", options: ["visited", "has visited", "was visiting"], ans: "visited" },
            { task: "Task 1: Grammar", inst: "Complete the sentences. Choose the correct form of the verb.", q: "Our sales <span class='gap-fill'>______________</span> as soon as we create our website.", options: ["improve", "will improve", "improved"], ans: "will improve" },
            { task: "Task 1: Grammar", inst: "Complete the sentences. Choose the correct form of the verb.", q: "Anthony said he <span class='gap-fill'>______________</span> sorry but I didn’t believe him.", options: ["is", "was", "would be"], ans: "was" },
            { task: "Task 1: Grammar", inst: "Complete the sentences. Choose the correct form of the verb.", q: "Remember <span class='gap-fill'>______________</span> me when you get to the hotel.", options: ["to call", "calling", "call"], ans: "to call" },
            { task: "Task 1: Grammar", inst: "Complete the sentences. Choose the correct form of the verb.", q: "That cake <span class='gap-fill'>______________</span> wonderful!", options: ["smell", "is smelling", "smells"], ans: "smells" },
            { task: "Task 1: Grammar", inst: "Complete the sentences. Choose the correct form of the verb.", q: "I think the children <span class='gap-fill'>______________</span> by the police in the next episode.", options: ["will rescue", "will be rescued", "are rescuing"], ans: "will be rescued" },
            { task: "Task 1: Grammar", inst: "Complete the sentences. Choose the correct form of the verb.", q: "The concert <span class='gap-fill'>______________</span> just started and they won’t let us in.", options: ["has", "is", "was"], ans: "has" },
            { task: "Task 1: Grammar", inst: "Complete the sentences. Choose the correct form of the verb.", q: "<span class='gap-fill'>______________</span> cookery programmes on TV makes me hungry.", options: ["Watch", "Watching", "To watch"], ans: "Watching" },
            { task: "Task 1: Grammar", inst: "Complete the sentences. Choose the correct form of the verb.", q: "Would you <span class='gap-fill'>______________</span> that restaurant if you’d read the reviews?", options: ["have booked", "book", "booked"], ans: "have booked" },
            { task: "Task 1: Grammar", inst: "Complete the sentences. Choose the correct form of the verb.", q: "If you’re stressed, please let me <span class='gap-fill'>______________</span> you.", options: ["help", "to help", "helping"], ans: "help" },

            // --- TASK 2 ---
            { task: "Task 2: Two Words", inst: "Complete the sentences with exactly two words.", q: "There are only <span class='gap-fill'>________ ________</span> people in the world who have been in space.", options: ["too many", "a few", "a little"], ans: "a few" },
            { task: "Task 2: Two Words", inst: "Complete the sentences with exactly two words.", q: "That was hilarious! I think that was <span class='gap-fill'>________ ________</span> film I’ve ever seen.", options: ["the funnier", "the funniest", "most funny"], ans: "the funniest" },
            { task: "Task 2: Two Words", inst: "Complete the sentences with exactly two words.", q: "<span class='gap-fill'>________ ________</span> to see each other again?", options: ["Are they going", "Will they", "Do they go"], ans: "Are they going" },
            { task: "Task 2: Two Words", inst: "Complete the sentences with exactly two words.", q: "That <span class='gap-fill'>________ ________</span> my old colleague Moya over there, but I’m not sure.", options: ["must be", "can't be", "might be"], ans: "might be" },
            { task: "Task 2: Two Words", inst: "Complete the sentences with exactly two words.", q: "Bella would tell us if she was feeling insecure, <span class='gap-fill'>________ ________</span>?", options: ["would she", "wouldn't she", "won't she"], ans: "wouldn't she" },
            { task: "Task 2: Two Words", inst: "Complete the sentences with exactly two words.", q: "She <span class='gap-fill'>________ ________</span> if I knew you but I said I didn’t.", options: ["said me", "told me", "asked me"], ans: "asked me" },
            { task: "Task 2: Two Words", inst: "Complete the sentences with exactly two words.", q: "When I was at school, we <span class='gap-fill'>________ ________</span> do lots of homework at the library.", options: ["used to", "use to", "were used"], ans: "used to" },
            { task: "Task 2: Two Words", inst: "Complete the sentences with exactly two words.", q: "There are <span class='gap-fill'>________ ________</span> cars in town on Saturdays. There’s nowhere to park.", options: ["too much", "too many", "so much"], ans: "too many" },

            // --- TASK 3 ---
            { task: "Task 3: Transformation", inst: "Pick the best relative clause connection combination.", q: "Chantelle makes costumes for films. She wanted to act when she was little.", options: ["Chantelle wanted to act when she makes costumes.", "Chantelle, who wanted to act when she was little, makes costumes for films.", "Chantelle makes costumes for films who wanted to act."], ans: "Chantelle, who wanted to act when she was little, makes costumes for films." },
            { task: "Task 3: Transformation", inst: "Pick the correct conditional structure.", q: "I hope I see you at the conference. I want to introduce you to Malek.", options: ["If I see you at the conference, I will introduce you to Malek.", "If I saw you at the conference, I want to introduce you.", "If I see you at the conference, I introduced you."], ans: "If I see you at the conference, I will introduce you to Malek." },
            { task: "Task 3: Transformation", inst: "Pick the best relative clause connection combination.", q: "Mushu is in Florence. It’s a very expensive restaurant.", options: ["Mushu is in Florence where is a very expensive restaurant.", "Mushu, which is in Florence, is a very expensive restaurant.", "Mushu is an expensive restaurant who is in Florence."], ans: "Mushu, which is in Florence, is a very expensive restaurant." },

            // --- TASK 4 ---
            { task: "Task 4: Structural Grammar", inst: "Choose the correct phrase selection.", q: "I’m sorry, <span class='gap-fill'>______________</span> you.", options: ["I’m not recognizing", "I don’t recognize", "I haven't recognized"], ans: "I don’t recognize" },
            { task: "Task 4: Structural Grammar", inst: "Choose the correct phrase selection.", q: "What do you call the words at the end of a film <span class='gap-fill'>______________</span> show all the jobs?", options: ["where", "that", "who"], ans: "that" },
            { task: "Task 4: Structural Grammar", inst: "Choose the correct phrase selection.", q: "The eggs are <span class='gap-fill'>______________</span> for ten minutes. Meanwhile, prepare the toast.", options: ["boiled", "to boil", "boiling"], ans: "boiled" },
            { task: "Task 4: Structural Grammar", inst: "Choose the correct phrase selection.", q: "Max said <span class='gap-fill'>______________</span> loved Indian food so I’ve cooked a curry.", options: ["Max", "he", "him"], ans: "he" },

            // --- TASK 5 ---
            { task: "Task 5: Collocations", inst: "Match the phrase element that fits with the action verb.", q: "Find the structural match for: **'do'**", options: ["money to a friend", "a business", "yoga"], ans: "yoga" },
            { task: "Task 5: Collocations", inst: "Match the phrase element that fits with the action verb.", q: "Find the structural match for: **'play'**", options: ["a part in a film", "something is true", "a salary"], ans: "a part in a film" },

            // --- TASK 6 ---
            { task: "Task 6: Odd One Out", inst: "Find the word that does not belong in the topic pool.", q: "Topic: Technology & Computing. Which word is out?", options: ["unplug", "charger", "delete"], ans: "charger" },
            { task: "Task 6: Odd One Out", inst: "Find the word that does not belong in the topic pool.", q: "Topic: Career Status. Which word is out?", options: ["redundant", "unemployed", "promoted"], ans: "promoted" },

            // --- TASK 7 ---
            { task: "Task 7: Affixes", inst: "Transform the root word with prefixes/suffixes.", q: "What is the correct negative structural variation of: **'legal'**?", options: ["unlegal", "illegal", "dislegal"], ans: "illegal" },
            { task: "Task 7: Affixes", inst: "Transform the root word with prefixes/suffixes.", q: "What is the noun transformation of: **'improve'**?", options: ["improveation", "improveable", "improvement"], ans: "improvement" },

            // --- TASK 8 ---
            { task: "Task 8: Gaps", inst: "Fill the gap context with the proper missing unit.", q: "I parked in the wrong place so I had to pay a <span class='gap-fill'>__________</span>.", options: ["fee", "fine", "ticket"], ans: "fine" },
            { task: "Task 8: Gaps", inst: "Fill the gap context with the proper missing unit.", q: "I’m trying to cut <span class='gap-fill'>__________</span> on tea and coffee.", options: ["down", "off", "out"], ans: "down" },
            { task: "Task 8: Gaps", inst: "Fill the gap context with the proper missing unit.", q: "I can’t choose <span class='gap-fill'>__________</span> the soup or the pasta. What do you think?", options: ["among", "between", "from"], ans: "between" },

            // --- TASK 9 ---
            { task: "Task 9: Multiple Choice", inst: "Select the vocabulary option that completes the line context.", q: "The bus was late, which was really <span class='gap-fill'>__________</span>.", options: ["frustrated", "frustration", "frustrating"], ans: "frustrating" },
            { task: "Task 9: Multiple Choice", inst: "Select the vocabulary option that completes the line context.", q: "James was embarrassed because his phone <span class='gap-fill'>__________</span> during the interview.", options: ["went off", "cut off", "sent off"], ans: "went off" },
            { task: "Task 9: Multiple Choice", inst: "Select the vocabulary option that completes the line context.", q: "This cottage has low <span class='gap-fill'>__________</span> in some of the rooms.", options: ["floors", "ceilings", "walls"], ans: "ceilings" }
        ];

        let index = 0;
        let scorePoints = 0;
        let rightAnswersCount = 0;
        let streak = 0;
        let questionAnswered = false;

        function runGameStep() {
            questionAnswered = false;
            document.getElementById("next-btn").style.display = "none";
            
            let dataItem = quizizzData[index];
            
            // Set HUD Info Text
            document.getElementById("hud-task").innerText = dataItem.task;
            document.getElementById("hud-instruction").innerText = dataItem.inst;
            document.getElementById("hud-question").innerHTML = dataItem.q;
            document.getElementById("hud-score").innerText = `✨ ${scorePoints} pts`;
            document.getElementById("streak-box").innerText = `🔥 Combo Streak: ${streak}`;
            
            // Progress Indicator Logic
            let percentage = (index / quizizzData.length) * 100;
            document.getElementById("progress-indicator").style.width = `${percentage}%`;

            // Draw up 3 choices cleanly
            let btnBox = document.getElementById("choices-box");
            btnBox.innerHTML = "";

            dataItem.options.forEach(opt => {
                let btn = document.createElement("button");
                btn.className = "quizizz-btn";
                btn.innerText = opt;
                btn.onclick = () => checkSelectedButton(btn, opt, dataItem.ans);
                btnBox.appendChild(btn);
            });
        }

        function checkSelectedButton(clickedBtn, userPicked, actualAnswer) {
            if (questionAnswered) return;
            questionAnswered = true;

            let allQuizButtons = document.getElementsByClassName("quizizz-btn");

            if (userPicked === actualAnswer) {
                clickedBtn.classList.add("correct");
                streak++;
                // Score calculations: base point 100 + streak multiplier bonuses
                scorePoints += 100 + (streak * 20);
                rightAnswersCount++;
                document.getElementById("streak-box").innerText = `🔥 Combo Streak: ${streak} (+${streak * 20} Bonus!)`;
            } else {
                clickedBtn.classList.add("wrong");
                streak = 0; // Reset continuous combo sequence tracking
                document.getElementById("streak-box").innerText = `💥 Streak Broken!`;
                
                // Expose target valid answer element in green styling
                for (let buttonElement of allQuizButtons) {
                    if (buttonElement.innerText === actualAnswer) {
                        buttonElement.classList.add("correct");
                    }
                }
            }

            document.getElementById("hud-score").innerText = `✨ ${scorePoints} pts`;
            document.getElementById("next-btn").style.display = "block";
        }

        function moveToNext() {
            index++;
            if (index < quizizzData.length) {
                runGameStep();
            } else {
                displayFinalLeaderboard();
            }
        }

        function displayFinalLeaderboard() {
            document.getElementById("game-arena").style.display = "none";
            document.getElementById("end-arena").style.display = "block";
            
            document.getElementById("final-tally").innerText = `${rightAnswersCount} / ${quizizzData.length} Correct`;
            
            let finalRatio = (rightAnswersCount / quizizzData.length) * 100;
            let performanceFeedbackText = "";
            
            if (finalRatio >= 85) performanceFeedbackText = "⚡ Quizizz Gods! Absolute Perfection! Have a legendary summer!";
            else if (finalRatio >= 65) performanceFeedbackText = "😎 Awesome job team! You crushed the final review!";
            else performanceFeedbackText = "☀️ Good try! Ready to relax and enjoy the summer holidays!";
            
            document.getElementById("final-comment").innerText = performanceFeedbackText;
        }

        // Initialize setup on window draw
        window.onload = runGameStep;
    </script>
</body>
</html>
