<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ultimate Revision</title>
    <style>
        :root { --primary: #6366f1; --success: #22c55e; --error: #ef4444; --bg: #f8fafc; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; padding: 20px; color: #1e293b; }
        .app-card { background: white; width: 100%; max-width: 450px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 24px; min-height: 500px; display: flex; flex-direction: column; }
        .progress-bar { width: 100%; height: 8px; background: #e2e8f0; border-radius: 4px; margin-bottom: 10px; overflow: hidden; }
        #progress-fill { height: 100%; background: var(--primary); transition: width 0.4s; width: 0%; }
        .header { margin-bottom: 20px; }
        .section-tag { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: var(--primary); letter-spacing: 1px; }
        .q-text { font-size: 1.2rem; font-weight: 600; line-height: 1.5; margin-top: 5px; }
        
        /* Interaction Area */
        .interaction { flex-grow: 1; margin-top: 20px; }
        input { width: 100%; border: 2px solid #e2e8f0; border-radius: 12px; padding: 14px; font-size: 1rem; margin-bottom: 10px; outline: none; box-sizing: border-box; }
        input:focus { border-color: var(--primary); }
        .options-grid { display: flex; flex-direction: column; gap: 10px; }
        .opt-btn { border: 2px solid #e2e8f0; border-radius: 12px; padding: 15px; font-size: 1rem; background: white; cursor: pointer; text-align: left; transition: 0.2s; font-weight: 500; }
        .opt-btn.correct { border-color: var(--success); background: #dcfce7; color: #166534; }
        .opt-btn.wrong { border-color: var(--error); background: #fee2e2; color: #991b1b; }
        
        /* Footer */
        .feedback { text-align: center; font-weight: 700; min-height: 30px; margin: 15px 0; }
        .main-btn { background: var(--primary); color: white; border: none; border-radius: 12px; padding: 18px; font-weight: 700; width: 100%; cursor: pointer; font-size: 1rem; }
        #next-btn { background: #1e293b; display: none; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="progress-bar"><div id="progress-fill"></div></div>
    <div class="header">
        <div id="section-name" class="section-tag">Grammar</div>
        <div id="question-text" class="q-text">Loading...</div>
    </div>

    <div class="interaction" id="interaction-area"></div>
    <div id="feedback" class="feedback"></div>

    <button id="submit-btn" class="main-btn" onclick="handleVerify()">Check Answer</button>
    <button id="next-btn" class="main-btn" onclick="handleNext()">Next Question →</button>
</div>

<script>
const quiz = [
    { cat: "Past Simple vs Continuous", type: "type", q: "I (read) ____ a book when the lights (go) ____ out.", a: ["was reading", "went"] },
    { cat: "Past Simple vs Continuous", type: "type", q: "While they (write) ____ their essays, the alarm (ring) ____.", a: ["were writing", "rang"] },
    { cat: "Past Perfect vs Simple", type: "choice", q: "The movie... by the time we arrived.", o: ["started", "had started"], a: 1 },
    { cat: "Past Perfect vs Simple", type: "choice", q: "I didn't have money because I... my wallet.", o: ["lost", "had lost"], a: 1 },
    { cat: "Used to vs Past Simple", type: "choice", q: "When I was young, I... a tricycle.", o: ["used to have", "had"], a: 0 },
    { cat: "Used to vs Past Simple", type: "choice", q: "In 2015, my family... to a new city.", o: ["used to move", "moved"], a: 1 },
    { cat: "Passive Voice", type: "type", q: "Passive: 'The police caught the robbers.' -> The robbers ____.", a: ["were caught"] },
    { cat: "Conditionals", type: "choice", q: "1st: If it rains tomorrow, we... the picnic.", o: ["cancel", "will cancel"], a: 1 },
    { cat: "Conditionals", type: "choice", q: "2nd: If I won the lottery, I... a boat.", o: ["will buy", "would buy"], a: 1 },
    { cat: "Conditionals", type: "choice", q: "3rd: If I had studied, I... the exam.", o: ["would pass", "would have passed"], a: 1 }
];

let cur = 0;

function init() {
    const data = quiz[cur];
    document.getElementById('section-name').innerText = data.cat;
    document.getElementById('question-text').innerText = data.q;
    document.getElementById('progress-fill').style.width = `${((cur + 1) / quiz.length) * 100}%`;
    document.getElementById('feedback').innerText = "";
    document.getElementById('next-btn').style.display = "none";
    
    const area = document.getElementById('interaction-area');
    area.innerHTML = "";

    if (data.type === "type") {
        document.getElementById('submit-btn').style.display = "block";
        data.a.forEach((_, i) => {
            const input = document.createElement('input');
            input.id = `ans-${i}`;
            input.placeholder = `Blank ${i+1}...`;
            input.autocomplete = "off";
            area.appendChild(input);
        });
    } else {
        document.getElementById('submit-btn').style.display = "none";
        const grid = document.createElement('div');
        grid.className = "options-grid";
        data.o.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = "opt-btn";
            btn.innerText = opt;
            btn.onclick = () => verifyChoice(i, btn);
            grid.appendChild(btn);
        });
        area.appendChild(grid);
    }
}

function handleVerify() {
    const data = quiz[cur];
    let isCorrect = true;
    data.a.forEach((val, i) => {
        if (document.getElementById(`ans-${i}`).value.trim().toLowerCase() !== val.toLowerCase()) isCorrect = false;
    });
    showFeedback(isCorrect);
}

function verifyChoice(idx, btn) {
    const data = quiz[cur];
    const btns = document.querySelectorAll('.opt-btn');
    btns.forEach(b => b.style.pointerEvents = 'none');
    if (idx === data.a) {
        btn.classList.add('correct');
        showFeedback(true);
    } else {
        btn.classList.add('wrong');
        btns[data.a].classList.add('correct');
        showFeedback(false);
    }
}

function showFeedback(ok) {
    const f = document.getElementById('feedback');
    f.innerText = ok ? "Excellent! ✨" : "Try again! Look at the rules.";
    f.style.color = ok ? "var(--success)" : "var(--error)";
    if (ok) {
        document.getElementById('submit-btn').style.display = "none";
        document.getElementById('next-btn').style.display = "block";
    }
}

function handleNext() {
    cur++;
    if (cur < quiz.length) init();
    else {
        document.querySelector('.app-card').innerHTML = `<div style="text-align:center; padding-top:50px;"><h1>🎯</h1><h2>Revision Done!</h2><p>Good luck tomorrow!</p><button class="main-btn" onclick="location.reload()">Restart</button></div>`;
    }
}

init(); // Start the game
</script>
</body>
</html>
