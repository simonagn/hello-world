<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smartboard English Review</title>
    <style>
        :root {
            --primary: #3a86ff;
            --secondary: #8338ec;
            --success: #38b000;
            --danger: #d90429;
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #212529;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-center: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--card);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            padding: 40px;
            box-sizing: border-box;
        }

        /* Top Bar Navigation & Progress */
        .header-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e9ecef;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .task-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--secondary);
            margin: 0;
        }

        .score-badge {
            background: var(--primary);
            color: white;
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .instruction {
            font-size: 1.2rem;
            color: #6c757d;
            font-style: italic;
            margin-bottom: 25px;
            text-align: left;
            background: #f1f3f5;
            padding: 10px 15px;
            border-left: 5px solid var(--primary);
        }

        /* Question Layout */
        .question-box {
            font-size: 2rem;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 35px;
            text-align: left;
            padding: 10px;
        }

        .highlight-gap {
            color: var(--primary);
            text-decoration: underline;
            font-weight: 700;
        }

        /* Large Smartboard Buttons */
        .choices-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        @media (min-width: 768px) {
            .choices-container.split {
                grid-template-columns: 1fr 1fr;
            }
        }

        .choice-btn {
            background: #f8f9fa;
            border: 3px solid #dee2e6;
            border-radius: 14px;
            padding: 22px 30px;
            font-size: 1.5rem;
            font-weight: bold;
            text-align: left;
            cursor: pointer;
            transition: all 0.15s ease;
            touch-action: manipulation;
        }

        .choice-btn:hover {
            background: #e9ecef;
            border-color: #ced4da;
            transform: scale(1.01);
        }

        .choice-btn.correct {
            background-color: #d8f3dc !important;
            border-color: var(--success) !important;
            color: #1b4332 !important;
        }

        .choice-btn.wrong {
            background-color: #fcd5ce !important;
            border-color: var(--danger) !important;
            color: #641111 !important;
        }

        /* Action Panel */
        .action-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            border-top: 2px solid #e9ecef;
            padding-top: 20px;
        }

        .progress-text {
            font-size: 1.2rem;
            color: #495057;
            font-weight: 600;
        }

        .control-btn {
            background: #212529;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            display: none;
        }

        .control-btn:hover {
            opacity: 0.9;
        }

        /* Finished Screen */
        .end-screen {
            display: none;
            text-align: center;
            padding: 40px 10px;
        }

        .end-title {
            font-size: 3rem;
            color: var(--success);
            margin-bottom: 20px;
        }

        .final-score-display {
            font-size: 5rem;
            font-weight: 900;
            margin: 30px 0;
            color: var(--primary);
        }
    </style>
</head>

        let index = 0;
        let score = 0;
        let answered = false;

        function displayQuestion() {
            answered = false;
            document.getElementById("action-btn").style.display = "none";
            
            let item = masterExam[index];
            
            // Set Titles & Descriptions
            document.getElementById("task-header").innerText = `TASK ${item.task}`;
            document.getElementById("task-instruction").innerText = item.inst;
            document.getElementById("question-text").innerHTML = item.q;
            document.getElementById("step-tracker").innerText = `Question ${index + 1} of ${masterExam.length}`;
            document.getElementById("live-score").innerText = `Score: ${score}`;

            // Layout settings for choices layout
            let box = document.getElementById("choices-box");
            box.innerHTML = "";
            
            if(item.options.length <= 2) {
                box.classList.remove("split");
            } else {
                box.classList.add("split");
            }

            // Create selection elements
            item.options.forEach(opt => {
                let btn = document.createElement("button");
                btn.className = "choice-btn";
                btn.innerHTML = opt;
                btn.onclick = () => evaluateChoice(btn, opt, item.ans);
                box.appendChild(btn);
            });
        }

        function evaluateChoice(selectedBtn, chosen, correct) {
            if (answered) return;
            answered = true;

            let allButtons = document.getElementsByClassName("choice-btn");
            
            if (chosen === correct) {
                selectedBtn.classList.add("correct");
                score++;
            } else {
                selectedBtn.classList.add("wrong");
                // Highlight actual valid path
                for (let b of allButtons) {
                    if (b.innerText === correct) {
                        b.classList.add("correct");
                    }
                }
            }

            document.getElementById("live-score").innerText = `Score: ${score}`;
            document.getElementById("action-btn").style.display = "block";
        }

        function handleActionClick() {
            index++;
            if (index < masterExam.length) {
                displayQuestion();
            } else {
                showFinalResults();
            }
        }

        function showFinalResults() {
            document.getElementById("quiz-flow").style.display = "none";
            document.getElementById("end-flow").style.display = "block";
            document.getElementById("final-tally").innerText = `${score} / ${masterExam.length}`;
            
            let percent = (score / masterExam.length) * 100;
            let msg = "";
            if(percent >= 85) msg = "🏆 Absolute Masters! Have an incredible summer holiday!";
            else if (percent >= 60) msg = "😎 Solid work! You are officially ready for summer vacation!";
            else msg = "☀️ Nice effort! Enjoy the sunshine and great job wrapping up the year!";
            
            document.getElementById("holiday-message").innerText = msg;
        }

        // Boot
        window.onload = displayQuestion;
